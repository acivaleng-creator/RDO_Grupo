- name: Compilar o APK Final
        run: |
          # Força o Python a ignorar erros de encoding em todo o sistema
          export PYTHONUTF8=1
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          
          # Limpeza bruta de TODOS os arquivos de texto do projeto
          find . -type f -name "*.py" -o -name "*.toml" -o -name "*.txt" | xargs sed -i 's/\r$//'
          
          # Comando de build com log detalhado para pegarmos o vilão
          flet build apk --verbose
