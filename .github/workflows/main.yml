name: Compilar RDO Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar os arquivos do projeto
        uses: actions/checkout@v4

      - name: Preparar o Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Preparar o Java (Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar motor Flet e ReportLab
        run: |
          pip install flet==0.23.2
          pip install reportlab==4.4.10
          pip install pillow==12.1.1
          pip install six # Essa biblioteca ajuda a resolver o erro de 'unicode'

      - name: Compilar o APK Final
        run: flet build apk
        env:
          PYTHONUNBUFFERED: 1

      - name: Disponibilizar APK para baixar
        uses: actions/upload-artifact@v4
        with:
          name: RDO_Grupo_Instalador
          path: build/apk/*.apk
