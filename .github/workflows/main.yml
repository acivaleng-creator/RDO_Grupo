name: Compilar RDO Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Dependências e Limpador
        run: |
          sudo apt-get install -y dos2unix
          pip install flet==0.23.2 reportlab==4.4.10 pillow==12.1.1 urllib3==2.2.1 six

      - name: Conversão Industrial para Linux
        run: |
          # Converte todos os arquivos de texto do formato Windows para Linux
          find . -type f -name "*.py" -o -name "*.toml" -o -name "*.txt" | xargs dos2unix
          # Injeta o tradutor de unicode
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "import builtins; builtins.unicode = str" > $SITE_PACKAGES/sitecustomize.py

      - name: Compilar o APK Final
        run: flet build apk

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: RDO_Grupo_Instalador
          path: build/apk/*.apk
