name: Compilar RDO Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: 1
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Flet e Dependências
        run: |
          pip install flet==0.23.2 reportlab==4.4.10 pillow==12.1.1 urllib3==2.2.1
          # Corrige o erro de unicode para bibliotecas de PDF
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "import builtins; builtins.unicode = str" > $SITE_PACKAGES/sitecustomize.py

      - name: Sanitização de Arquivos (Windows to Linux)
        run: |
          # Remove o caractere invisível BOM e converte fins de linha para Linux
          find . -type f -name "*.py" -o -name "*.toml" -o -name "*.txt" | xargs sed -i '1s/^\xEF\xBB\xBF//'
          find . -type f -name "*.py" -o -name "*.toml" -o -name "*.txt" | xargs sed -i 's/\r$//'

      - name: Compilar o APK Final
        run: |
          export PYTHONUTF8=1
          export LANG=en_US.UTF-8
          flet build apk --verbose

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: RDO_Grupo_Instalador
          path: build/apk/*.apk

