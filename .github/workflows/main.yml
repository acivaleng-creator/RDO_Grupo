name: Compilar RDO Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Flet e ReportLab
        run: |
          pip install flet==0.23.2
          pip install reportlab==4.4.10
          pip install pillow==12.1.1

      - name: Tradutor de Unicode (Correção Atômica)
        run: |
          # Esta linha injeta a definição de unicode no sistema para enganar o erro
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "import builtins; builtins.unicode = str" > $SITE_PACKAGES/sitecustomize.py
          # Também corrige nos arquivos do projeto
          find . -name "*.py" -exec sed -i 's/unicode(/str(/g' {} + || true

      - name: Compilar o APK Final
        run: flet build apk

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: RDO_Grupo_Instalador
          path: build/apk/*.apk
