name: Compilar RDO Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: 1
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Flet e ReportLab
        run: |
          pip install flet==0.23.2
          pip install reportlab==4.4.10
          pip install pillow==12.1.1
          pip install urllib3==2.2.1

      - name: Limpeza Industrial de Arquivos
        run: |
          # Define unicode como str para o ReportLab não quebrar no Python 3
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "import builtins; builtins.unicode = str" > $SITE_PACKAGES/sitecustomize.py
          # Remove o "lixo" invisível do Windows em todos os arquivos .py e .toml
          find . -type f -name "*.py" -o -name "*.toml" | xargs sed -i 's/\r$//'

      - name: Compilar o APK Final
        run: |
          # Define o ambiente para UTF-8 puro no momento do build
          export PYTHONUTF8=1
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          # Garante que o flet.toml esteja limpo
          sed -i 's/\r$//' flet.toml
          flet build apk

      - name: Upload do APK pronto
        uses: actions/upload-artifact@v4
        with:
          name: RDO_Grupo_Instalador
          path: build/apk/*.apk
