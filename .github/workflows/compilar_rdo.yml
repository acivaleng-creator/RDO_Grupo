name: Compilar RDO Android Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: 1
      LANG: en_US.UTF-8
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Libs
        run: |
          pip install flet==0.23.2 reportlab==4.4.10 pillow==12.1.1
          # Corrige o erro de unicode que vimos nas suas imagens
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "import builtins; builtins.unicode = str" > $SITE_PACKAGES/sitecustomize.py

      - name: Limpar arquivos Windows
        run: |
          # Remove lixo invisivel do flet.toml e main.py
          find . -type f -name "*.py" -o -name "*.toml" | xargs sed -i 's/\r$//'

      - name: Gerar APK
        run: |
          export PYTHONUTF8=1
          flet build apk --verbose

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: RDO_Grupo_App
          path: build/apk/*.apk
